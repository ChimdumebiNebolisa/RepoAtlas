name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to avoid duplicate work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e
        env:
          CI: true

  mobile-native-share:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps webkit
      - name: Repeat native sharing without retries
        run: >-
          npx playwright test e2e/report-ui.spec.ts
          --project=mobile
          --retries=0
          --repeat-each=5
          --grep 'completed brief uses native sharing when the browser provides it'
        env:
          CI: true
